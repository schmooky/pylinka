name: Release

# Unified release + snapshot pipeline, published to npm via OIDC TRUSTED
# PUBLISHING — no long-lived NPM_TOKEN secret.
#
# npm trusted publishing pins ONE workflow file per package, so both flows
# live in this file. Job-level `if:` selects the path:
#   push to main             → release  job (changesets/action)
#   push to any other branch → snapshot job (per-branch dist-tag)
#   workflow_dispatch        → snapshot job (manual, for testing the OIDC path)
#
# ── One-time npm setup (npmjs.com, for EACH of the four packages:
#    @pylinka/graph, @pylinka/compiler, @pylinka/format, @pylinka/core) ──
#   Package → Settings → Trusted Publisher → GitHub Actions, with:
#     Organization or user: schmooky          (the GitHub repo owner)
#     Repository:           pylinka
#     Workflow filename:    release.yml        (this file's name — exact)
#     Environment:          npm-publish        (must match `environment:` below)
#   Note: trusted publishing can only be configured on packages that already
#   exist, so the very first 0.1.0 publish is manual (`pnpm release` locally
#   after `npm login`). Every release after that flows through here.
#
# How auth works: with `id-token: write`, the npm CLI (>= 11.5.1) exchanges
# this run's GitHub OIDC token for a short-lived npm publish token. Nothing
# long-lived is stored. Provenance attaches a signed SLSA attestation.

on:
  push:
    branches-ignore:
      # Changesets opens this branch for the "Version Packages" PR; publishing
      # from it would double-publish.
      - 'changeset-release/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to snapshot (defaults to the workflow ref)'
        required: false
        type: string
      tag:
        description: 'Override dist-tag (defaults to sanitized branch name)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Node 22 LTS ships npm 10.x. OIDC trusted publishing was added in npm
  # 11.5.1 — without upgrading, the CLI never performs the handshake and
  # `changeset publish` fails with ENEEDAUTH/E404. Pinned for reproducibility;
  # bump deliberately.
  PUBLISH_NPM_VERSION: '11.16.0'

jobs:
  # ── Release: push to main only ─────────────────────────────────────────
  # Driven by changesets:
  #   - pending changesets on main → opens/updates the "Version Packages" PR.
  #   - that PR merged (no pending changesets) → `pnpm release` publishes.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      # changesets/action needs these to open the Version Packages PR + create
      # GitHub Releases.
      contents: write
      pull-requests: write
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # changesets needs full history to compute "what changed since the
          # last release tag".
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url. setup-node would write ~/.npmrc with
          # `_authToken=${NODE_AUTH_TOKEN}` and export a placeholder token;
          # npm then treats the placeholder as real, skips OIDC, and 404s.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: |
          npm install -g "npm@${PUBLISH_NPM_VERSION}"
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify (build + typecheck + lint + tests)
        run: |
          pnpm build
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # Opens or updates the "Version Packages" PR with pending bumps.
          version: pnpm version-packages
          # Runs when the Version Packages PR has already been merged —
          # publishes the bumped packages to npm via OIDC.
          publish: pnpm release
          createGithubReleases: true
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NODE_AUTH_TOKEN: auth is OIDC trusted publishing. Provenance
          # attaches a signed SLSA attestation (public package + repo only).
          NPM_CONFIG_PROVENANCE: 'true'

  # ── Snapshot: every other branch + manual dispatch ─────────────────────
  # Publishes a Changesets "snapshot" of the pending changesets under a
  # per-branch dist-tag, so reviewers can install a preview without touching
  # `latest`. Skips automatically when there are no pending changesets.
  snapshot:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      # Required for npm OIDC trusted publishing + provenance attestation.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url (see the release job for why) — OIDC
          # requires npm to have no pre-seeded token.

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: |
          npm install -g "npm@${PUBLISH_NPM_VERSION}"
          npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Skip if no pending changesets
        id: gate
        run: |
          shopt -s nullglob
          files=(.changeset/*.md)
          changesets=()
          for f in "${files[@]}"; do
            base=$(basename "$f")
            [ "$base" = "README.md" ] && continue
            changesets+=("$f")
          done
          if [ ${#changesets[@]} -eq 0 ]; then
            echo "No pending changesets — skipping snapshot."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "Found ${#changesets[@]} pending changeset(s)."
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify (build + typecheck + lint + tests)
        if: steps.gate.outputs.skip == '0'
        run: |
          pnpm build
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Derive dist-tag
        if: steps.gate.outputs.skip == '0'
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            RAW="${{ github.event.inputs.tag }}"
          else
            RAW="${{ github.event.inputs.branch || github.ref_name }}"
          fi
          SAN=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/^-*//; s/-*$//')
          echo "tag=$SAN" >> "$GITHUB_OUTPUT"
          echo "Snapshot dist-tag: $SAN"

      - name: Publish snapshot
        if: steps.gate.outputs.skip == '0'
        run: pnpm snapshot
        env:
          SNAPSHOT_TAG: ${{ steps.tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NODE_AUTH_TOKEN: auth is OIDC trusted publishing.
          NPM_CONFIG_PROVENANCE: 'true'
